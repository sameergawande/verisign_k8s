apiVersion: apps/v1
kind: Deployment
metadata: { name: json-logger, namespace: obs-lab-$STUDENT_NAME }
spec:
  replicas: 2
  selector:
    matchLabels: { app: json-logger }
  template:
    metadata: { labels: { app: json-logger } }
    spec:
      containers:
      - name: logger
        image: busybox
        command: ['sh', '-c', 'i=0; while true; do printf "{\"timestamp\":\"%s\",\"level\":\"info\",\"service\":\"order-api\",\"request_id\":\"%d\",\"status\":200}\n" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "$i"; sleep 1; i=$((i+1)); done']
